# We have some basic localization support.
# We support "en_US", "tr", "ru", and "es"
lang: en_US

allow_infinite_effects: false

ritual_duration: 600  # Duration in seconds (10 minutes)
ritual_duration_ender: 3600 # Duration in seconds (1hr)

regular_effect_broadcast: true

ritual_beacon: true

empty_effect_icon: true

player_head_drops: true

enable_discord_broadcasts: false

discord_webhook_url: ""

brewing_gui: true

# Determines what effect is dropped.
# "random" = Drops effect 1 or 2 at random.  If no effect is in the random slot, it will drop the effect in the other slot.
# "prefer_1" = Drops the effect in slot 1.  If no effect is in slot 1, it will drop the effect in slot 2.
# "prefer_2" = Drops the effect in slot 2.  If no effect is in slot 2, it will drop the effect in slot 1.
# "only_1" = Drops the effect in slot 1.  If no effect is in slot 1, nothing happens.
# "only_2" = Drops the effect in slot 2.  If no effect is in slot 2, nothing happens.
# "none" = No effects will drop
effect_drops: random

# The number of seconds that it takes for 1 hit to be removed from the hit timer.
# This is primarily used to trigger the "on ten hit" abilities of each effect.
# To trigger them, you need to hit your target 10 times with the specified number of seconds
hit_counter_decay_seconds: 15

join_effects_enabled: false

join_effects:
  - ocean
  - emerald
  - fire
  - speed

# First number is the augmented limit, the second is the regular limit
craft_limits:
  emerald:  [1, 3]
  ender:    [1, 3]
  feather:  [1, 3]
  fire:     [1, 3]
  frost:    [1, 3]
  haste:    [1, 3]
  heart:    [1, 3]
  invis:    [1, 3]
  ocean:    [1, 3]
  regen:    [1, 3]
  speed:    [1, 3]
  strength: [1, 3]
  thunder:  [1, 3]
  apophis:  [1, 3]
  thief:    [1, 3]


# Full cooldown is duration + cooldown
invis:
  hide_kills: false
  hide_deaths: false
  cooldown:
    default: 121
    augmented: 61
  duration:
    default: 20
    augmented: 25

apophis:
  xp_stolen_per_hit: 15
  xp_stolen_percent: 1
  percent_xp_to_share: 0.5
  lock_duration_seconds: 10
  cooldown:
    default: 125
    augmented: 75
  duration:
    default: 15
    augmented: 18
  enchantment:
    looting_level: 5

emerald:
  xp_stolen_per_hit: 15
  xp_stolen_percent: 1
  percent_xp_to_share: 0.5
  lock_duration_seconds: 10
  cooldown:
    default: 91
    augmented: 76
  duration:
    default: 30
    augmented: 35
  enchantment:
    looting_level: 5
  multiplier-xp:
    standard: 2
    use-effect: 4

ender:
  cooldown:
    default: 60
    augmented: 50
  duration:
    default: 15
    augmented: 20
  passive:
    radius: 10
  spark:
    # WARNING: The higher this value is, the more it can impact server performance.
    max-distance: 15

feather:
  cooldown:
    default: 63
    augmented: 33
  duration:
    default: 2
    augmented: 2
  land:
    radius: 4
    damage: 8

fire:
  cooldown:
    default: 66
    augmented: 36
  duration:
    default: 5
    augmented: 6
  passive:
    # How fast should they be able to walk while in lava?
    walk-speed: 0.6
  spark:
    radius: 5
    explosion-radius: 5

frost:
  cooldown:
    default: 121
    augmented: 76
  duration:
    default: 15
    augmented: 20
  passive:
    # WARNING: The higher this value is, the more it can impact server performance.
    snow-changing-radius: 3
    # How fast should they be able to walk in powdered snow?
    walk-speed: 0.6
  spark:
    radius: 5

haste:
  cooldown:
    default: 76
    augmented: 46
  duration:
    default: 15
    augmented: 20
  enchantment:
    fortune_level: 5
    efficiency_level: 10
    unbreaking_level: 5

heart:
  cooldown:
    default: 181
    augmented: 91
  duration:
    default: 60
    augmented: 80

ocean:
  cooldown:
    default: 76
    augmented: 46
  duration:
    default: 15
    augmented: 20
  passive:
    drown-strength: 5
    drown-damage: 1
  spark:
    drown-strength: 20
    drown-damage: 2

regen:
  cooldown:
    default: 91
    augmented: 61
  duration:
    default: 15
    augmented: 30
