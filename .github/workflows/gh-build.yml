name: Build & publish Infuse to maven
on: [push]

env:
  MAVEN_USERNAME: infuse
  MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

jobs:
  # Getting version number
  tag_version:
    runs-on: ubuntu-latest
    outputs:
      full_version: ${{ steps.version_finder.outputs.full_version }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Finding version number
        id: version_finder
        run: |
          # Start at 1
          BUILD_NUMBER=1
        
          # Get version from gradle.properties
          VERSION=$(grep "version=" gradle.properties | cut -d'=' -f2)
          CHANNEL=$(grep "channel=" gradle.properties | cut -d'=' -f2)
        
          # Check for existing build
          if git tag | grep -E "${VERSION}-${CHANNEL}[0-9]+$" >/dev/null; then
            BUILD_NUMBER=$(($(git tag | grep -E "${VERSION}-${CHANNEL}[0-9]+$" | sed 's/.*-${CHANNEL}//' | sort -n | tail -1) + 1))
          fi
        
          # Putting together the version
          FULL_VERSION="${VERSION}-${CHANNEL}{BUILD_NUMBER}"
        
          # Saving the full version
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=${FULL_VERSION}" >> $GITHUB_ENV
      - name: Tagging the latest commit
        run: git tag "${FULL_VERSION}"
  # Building for java 21
  build-21:
    runs-on: ubuntu-latest
    needs: tag_version
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Modifying gradle.properties
        run: |
          sed -i "s/version=.*/version=${{ needs.tag_version.outputs.full_version }}/" gradle.properties
          sed -i "s/javaVersion=.*/javaVersion=21/" gradle.properties
          sed -i "s/minecraftVersion=.*/minecraftVersion=1.21.11/" gradle.properties
      - name: "Running build"
        run: ./gradlew build
      - name: "Publishing build"
        run: ./gradlew publish
  # Building for java 25
  build-25:
    runs-on: ubuntu-latest
    needs: tag_version
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Modifying gradle.properties
        run: |
          sed -i "s/version=.*/version=${{ needs.tag_version.outputs.full_version }}/" gradle.properties
          sed -i "s/javaVersion=.*/javaVersion=25/" gradle.properties
          sed -i "s/minecraftVersion=.*/minecraftVersion=26.1.2/" gradle.properties
      - name: "Running build"
        run: ./gradlew build
      - name: "Publishing build"
        run: ./gradlew publish
  # Publishing to modrinth
  publish:
    needs:
      - tag_version
      - build-21
      - build-25
    runs-on: ubuntu-latest
    steps:
      - name: Publishing build for 1.21.x
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: x1wqx4cm
          version: ${{ needs.tag_version.outputs.full_version }}
          loaders: '["paper", "purpur"]'
          game-versions: 1.21.4 - 1.21.11
          files: https://maven.turbojax.org/releases/com/catadmirer/infuse/${{ needs.tag_version.outputs.full_version }}-21/infuse-${{ needs.tag_version.outputs.full_version }}-21.jar
      - name: Publishing build for 26.1.x
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: x1wqx4cm
          version: ${{ needs.tag_version.outputs.full_version }}
          loaders: '["paper", "purpur"]'
          game-versions: 26.1.x
          files: https://maven.turbojax.org/releases/com/catadmirer/infuse/${{ needs.tag_version.outputs.full_version }}-25/infuse-${{ needs.tag_version.outputs.full_version }}-25.jar